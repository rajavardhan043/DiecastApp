name: Sync Car Lookup

on:
  repository_dispatch:
    types: [sync-car-data]
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sync carLookup from manifest
        run: node scripts/sync_car_lookup.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/carLookup.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/carLookup.json
          git commit -m "chore: sync carLookup from Hot Wheels Wiki data"
          git push
